<div class="expired-page">
<!--  <app-mc-header></app-mc-header>-->
  <img src="logo.svg" alt="App Logo" class="logo">

  <div class="content">
    <div class="title-holder">
      <h1 class="title">Link wygasł ⏰</h1>
    </div>

    <p class="description">
      Podaj adres e-mail, a my wyślemy<br>
      nowy link do Masterclassy 😌
    </p>

    @if (success()) {
      <p class="message success-message">
        Nowy link został wysłany! Sprawdź swoją skrzynkę.
      </p>
    } @else {
      <form class="form" (ngSubmit)="submit()">
        <input
          type="email"
          class="email-input"
          placeholder="przykład@gmail.com"
          [(ngModel)]="email"
          name="email"
          required
        />
        <button type="submit" class="submit-btn" [disabled]="loading()">
          @if (loading()) {
            <span class="loader"></span>
          } @else {
            Wyślij nowy link
          }
        </button>
      </form>

      @if (error()) {
        <p class="message error-message">
          Nie udało się wysłać linku. Sprawdź email i spróbuj ponownie.
        </p>
      }
    }
  </div>
  <img src="welcome-screen/clothes.png" alt="Clothes" class="clothes"/>

<!--  <app-mc-footer></app-mc-footer>-->
</div>
